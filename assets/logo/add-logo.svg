<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="scanlines">
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#39FF14"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#0A0E14"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#0a0a0f" rx="0"/>

  <!-- NES Cartridge Shell -->
  <rect x="10" y="10" width="780" height="380" rx="18" fill="#E60012"/>
  <rect x="10" y="10" width="780" height="380" rx="18" fill="none" stroke="#1A1A2E" stroke-width="4"/>

  <!-- Cartridge Top Groove -->
  <rect x="250" y="24" width="300" height="6" rx="3" fill="#D4A017" opacity="0.9"/>

  <!-- Terminal Screen -->
  <rect x="42" y="48" width="716" height="290" rx="10" fill="url(#screenGrad)"/>
  <rect x="42" y="48" width="716" height="290" rx="10" fill="none" stroke="#1A1A2E" stroke-width="3"/>

  <!-- Scanline overlay -->
  <g opacity="0.04">
    <line x1="42" y1="52" x2="758" y2="52" stroke="#fff" stroke-width="1"/>
    <line x1="42" y1="56" x2="758" y2="56" stroke="#fff" stroke-width="1"/>
    <line x1="42" y1="60" x2="758" y2="60" stroke="#fff" stroke-width="1"/>
    <line x1="42" y1="64" x2="758" y2="64" stroke="#fff" stroke-width="1"/>
    <line x1="42" y1="68" x2="758" y2="68" stroke="#fff" stroke-width="1"/>
    <line x1="42" y1="72" x2="758" y2="72" stroke="#fff" stroke-width="1"/>
    <line x1="42" y1="76" x2="758" y2="76" stroke="#fff" stroke-width="1"/>
    <line x1="42" y1="80" x2="758" y2="80" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Prompt line -->
  <text x="74" y="120" font-family="'Courier New', monospace" font-size="18" fill="#39FF14" font-weight="bold">$</text>
  <text x="94" y="120" font-family="'Courier New', monospace" font-size="18" fill="#00FFFF" opacity="0.7">audit --driven --development</text>

  <!-- ADD Title -->
  <text x="74" y="240" font-family="'Courier New', monospace" font-size="96" font-weight="900"
        letter-spacing="16" fill="url(#titleGrad)" filter="url(#glow)">ADD</text>

  <!-- Blinking cursor -->
  <rect x="434" y="162" width="12" height="78" fill="#39FF14" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.6;0;0;0.6" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Subtitle -->
  <text x="78" y="280" font-family="'Courier New', monospace" font-size="17" fill="#00FFFF"
        letter-spacing="6" opacity="0.85">AUDIT-DRIVEN DEVELOPMENT</text>

  <!-- Cartridge Label Strip (gold) -->
  <rect x="42" y="318" width="716" height="6" rx="3" fill="#D4A017" opacity="0.25"/>

  <!-- Bottom cartridge pins -->
  <g fill="#D4A017">
    <rect x="130" y="365" width="16" height="10" rx="3"/>
    <rect x="156" y="365" width="16" height="10" rx="3"/>
    <rect x="182" y="365" width="16" height="10" rx="3"/>
    <rect x="208" y="365" width="16" height="10" rx="3"/>
    <rect x="234" y="365" width="16" height="10" rx="3"/>
    <rect x="260" y="365" width="16" height="10" rx="3"/>
    <rect x="286" y="365" width="16" height="10" rx="3"/>
    <rect x="312" y="365" width="16" height="10" rx="3"/>
    <rect x="338" y="365" width="16" height="10" rx="3"/>
    <rect x="364" y="365" width="16" height="10" rx="3"/>
    <rect x="390" y="365" width="16" height="10" rx="3"/>
    <rect x="416" y="365" width="16" height="10" rx="3"/>
    <rect x="442" y="365" width="16" height="10" rx="3"/>
    <rect x="468" y="365" width="16" height="10" rx="3"/>
    <rect x="494" y="365" width="16" height="10" rx="3"/>
    <rect x="520" y="365" width="16" height="10" rx="3"/>
    <rect x="546" y="365" width="16" height="10" rx="3"/>
    <rect x="572" y="365" width="16" height="10" rx="3"/>
    <rect x="598" y="365" width="16" height="10" rx="3"/>
    <rect x="624" y="365" width="16" height="10" rx="3"/>
    <rect x="650" y="365" width="16" height="10" rx="3"/>
  </g>

  <!-- Small spec dot (NES cartridge detail) -->
  <circle cx="580" cy="33" r="5" fill="#1A1A2E" opacity="0.5"/>
  <circle cx="600" cy="33" r="3" fill="#1A1A2E" opacity="0.3"/>
</svg>
