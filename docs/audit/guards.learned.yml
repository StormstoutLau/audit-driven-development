  - id: "REF-PYTHON-P-002"
    description: "Pydantic V1/V2 Compat Layer Stability"
    scope: "**/*.py"
    severity: "critical"
    check: |
      1. **Grep for `if PYDANTIC_V2` / `else:` blocks** in `_compat.py`: Each conditional branch must have equivalent behavior for annotation handling, field creation, and model validation. 2. **V1 path at `_compat.py:L290-L393`**: The `get_model_definitions()` function (V1-only) has custom `\f` truncation logic. V2 path uses `schema_generator.generate_definitions()` — no truncation. This is a known asymmetry (KB-2 related). 3. **`pydantic._internal` imports**: Any code importing from `pydantic._internal` is accessing private API surface. These APIs can change between Pydantic minor versions (e.g., 2.10 → 2.11) without deprecation warning. - `pydantic._internal._typing_extra` — used in `_compat.py` - `pydantic._internal._config` — used in `_compat.py` - These are DRAGONS — flag any usage in audit ### ADD Subagent Prompt Extension ``` DIMENSION 6 extension for Pydantic-compatible projects: - Check if the project uses pydantic._internal imports - For each _internal import: this is a forward-compat risk - Check if there are version-specific code paths that handle Pydantic minor version differences (e.g., 2.10 vs 2.11 behavior changes) - The project's pyproject.toml should declare a specific Pydantic version range, not just >=2.0.0 — internal API surface changes between minors ``` --- 
