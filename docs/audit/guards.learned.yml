  - id: "REF-PYTHON-P-001"
    description: "Annotated Metadata Propagation (KB-5 root cause)"
    scope: "**/*.py"
    severity: "critical"
    check: |
      ```python # CORRECT: Annotated with AfterValidator — the metadata should be preserved from typing import Annotated from pydantic import AfterValidator @app.get("/items/") async def read_items( q: Annotated[str, AfterValidator(lambda v: v.strip())] = "default" ): ... # BUG PATTERN: analyze_param() in fastapi/dependencies/utils.py strips # Annotated metadata before passing to Pydantic's FieldInfo # Look for calls to get_origin() or get_args() on Annotated types # that discard the __metadata__ tuple ``` 1. **Check `dependencies/utils.py:analyze_param()`**: Does it correctly handle `typing.Annotated[base_type, *metadata]`? Does it pass `__metadata__` through? 2. **Check `_compat.py:get_annotations()` or similar**: Any code that resolves forward references or strips annotations — does it preserve non-FastAPI metadata items (AfterValidator, BeforeValidator)? 3. **Check `_compat.py:ModelField` create path**: Pydantic V2 uses `pydantic.FieldInfo.from_annotated_attribute()`. FastAPI's compat layer must not interfere with this. 4. **Grep for `__metadata__`**: The `typing.Annotated.__metadata__` attribute contains the extra metadata. Any code manipulating Annotated types must preserve this attribute. ### Known Bug: FastAPI 0.115.8 → 0.115.11 - **Bug**: PR #13314 (Pydantic 2.11 compat) changed `_compat.py` annotation handling, which broke `AfterValidator` propagation → #13440 - **Fix**: PR #13442 reverted the problematic change and added docs + tests - **Root cause**: The annotation compatibility change for Pydantic 2.11's internal API surface (`_internal._typing_extra`) inadvertently stripped non-FastAPI metadata from `Annotated` types - **Why tests didn't catch it**: No existing tests used AfterValidator with query parameters — the feature existed but was untested - **Detection window**: v0.115.8 through v0.115.10 (3 patch versions, ~2 months) ### ADD Subagent Prompt Extension ``` DIMENSION 1 extension for Pydantic/FastAPI projects: - Check all `Annotated[type, *metadata]` processing in dependency analysis code - For each Annotated type: verify __metadata__ tuple is preserved through analyze_param → get_typed_signature → get_dependant chain - Specific check: does code call typing.get_args(annotated_type) and discard args[1:] (the metadata portion)? - Check: does _compat.py's FieldInfo creation path correctly pass Pydantic metadata (AfterValidator, BeforeValidator, etc.) to the Pydantic engine? ``` --- 
